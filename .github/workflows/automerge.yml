name: Auto-Merge Jules
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  jules-override:
    runs-on: ubuntu-latest
    # Only runs if the PR is from Jules
    if: github.actor == 'google-labs-code'
    permissions:
      pull-requests: write
      contents: write
    
    steps:
      - name: Force Merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
