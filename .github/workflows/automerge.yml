name: Auto-Merge AI Agents
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-agent-automerge:
    runs-on: ubuntu-latest
    # Added your specific actor to the condition to prevent the job from skipping
    if: >
      github.actor == 'google-labs-jules[bot]' || 
      github.actor == 'github-copilot[bot]' || 
      github.actor == 'getwebface'
    permissions:
      pull-requests: write
      contents: write
    
    steps:
      - name: Force Merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --repo "getwebface/trueroofnextgen" --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
